<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Portfolio</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h2 class="logo">MyPortfolio</h2>
    <nav>
        <a href="#home">Home</a>
        <a href="#about">About</a>
        <a href="#contact">Contact</a>
    </nav>
</header>

<!-- HERO -->
<section id="home" class="hero">
    <h1>Hello, I'm <span>Web Developer</span></h1>
    <p>I build modern and responsive websites</p>
    <button onclick="scrollToContact()">Hire Me</button>
</section>

<!-- PROJECTS -->
<section class="section">
    <h2>My Projects</h2>

    <div class="projects">
        <div class="card">
            <h3>Project 1</h3>
            <p>Website design</p>
        </div>
        <div class="card">
            <h3>Project 2</h3>
            <p>App UI</p>
        </div>
        <div class="card">
            <h3>Project 3</h3>
            <p>Landing Page</p>
        </div>
    </div>
</section>

<!-- ABOUT -->
<section id="about" class="section">
    <h2>About Me</h2>
    <p>I am a passionate web developer learning modern technologies.</p>

    <div class="skills">
        <span>HTML</span>
        <span>CSS</span>
        <span>JavaScript</span>
    </div>
</section>

<!-- CONTACT -->
<section id="contact" class="section">
    <h2>Contact Me</h2>

    <form id="contactForm">
        <input type="text" id="name" placeholder="Your Name">
        <input type="email" id="email" placeholder="Your Email">
        <textarea id="message" placeholder="Message"></textarea>
        <button type="submit">Send Message</button>
    </form>

    <p id="formMsg"></p>
</section>

<script src="script.js"></script>
</body>
</html>
